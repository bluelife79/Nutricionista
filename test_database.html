<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Suite — App Nutricion</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        color: #222;
        padding: 24px;
        font-size: 14px;
        line-height: 1.5;
      }

      header {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 20px 24px;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }

      header h1 {
        font-size: 18px;
        font-weight: 700;
        color: #111;
      }

      header .meta {
        font-size: 12px;
        color: #888;
      }

      #summary-bar {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 14px 24px;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      #summary-count {
        font-size: 22px;
        font-weight: 700;
      }

      #summary-count.all-pass { color: #16a34a; }
      #summary-count.has-fail { color: #dc2626; }

      .stat-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: #f5f5f5;
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 600;
      }
      .stat-pill.pass { background: #dcfce7; color: #15803d; }
      .stat-pill.fail { background: #fee2e2; color: #b91c1c; }
      .stat-pill.skip { background: #fef9c3; color: #92400e; }

      button#run-btn {
        background: #1d4ed8;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 8px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        margin-left: auto;
      }
      button#run-btn:hover { background: #1e40af; }
      button#run-btn:disabled { background: #9ca3af; cursor: default; }

      #progress-msg {
        font-size: 12px;
        color: #888;
        margin-left: 8px;
      }

      #tests-container {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .test-card {
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        overflow: hidden;
      }

      .test-card.result-pass { border-left: 4px solid #16a34a; }
      .test-card.result-fail { border-left: 4px solid #dc2626; }
      .test-card.result-skip { border-left: 4px solid #f59e0b; }

      .test-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        cursor: pointer;
        user-select: none;
      }
      .test-header:hover { background: #fafafa; }

      .badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 4px;
        min-width: 44px;
        text-align: center;
        letter-spacing: 0.5px;
      }
      .badge-pass { background: #dcfce7; color: #15803d; }
      .badge-fail { background: #fee2e2; color: #b91c1c; }
      .badge-skip { background: #fef9c3; color: #92400e; }
      .badge-pending { background: #f0f0f0; color: #888; }

      .test-id {
        font-size: 11px;
        color: #999;
        font-weight: 600;
        min-width: 36px;
      }

      .test-label {
        font-weight: 600;
        flex: 1;
        color: #111;
      }

      .test-note {
        font-size: 11px;
        color: #888;
        font-style: italic;
        max-width: 340px;
        text-align: right;
      }

      .chevron {
        font-size: 10px;
        color: #bbb;
        margin-left: 4px;
        transition: transform 0.15s;
      }
      .test-card.open .chevron { transform: rotate(90deg); }

      .test-body {
        display: none;
        border-top: 1px solid #e0e0e0;
        padding: 12px 16px 16px;
      }
      .test-card.open .test-body { display: block; }

      .fail-reason {
        background: #fff5f5;
        border: 1px solid #fecaca;
        border-radius: 6px;
        padding: 10px 14px;
        margin-bottom: 12px;
        font-size: 12px;
        color: #b91c1c;
      }
      .fail-reason ul { margin-top: 6px; padding-left: 18px; }
      .fail-reason li { margin-top: 3px; }

      .results-table-wrap {
        overflow-x: auto;
      }

      table.results-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      table.results-table th {
        background: #f5f5f5;
        text-align: left;
        padding: 6px 10px;
        font-weight: 600;
        color: #555;
        border-bottom: 1px solid #e0e0e0;
      }
      table.results-table td {
        padding: 6px 10px;
        border-bottom: 1px solid #f0f0f0;
        vertical-align: top;
      }
      table.results-table tr:last-child td { border-bottom: none; }
      table.results-table tr:hover td { background: #fafafa; }

      .tier-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 3px;
      }
      .tier1 { background: #dbeafe; color: #1d4ed8; }
      .tier2 { background: #ede9fe; color: #6d28d9; }
      .tier3 { background: #f3f4f6; color: #6b7280; }

      .level-badge {
        display: inline-block;
        font-size: 10px;
        font-weight: 600;
        padding: 1px 6px;
        border-radius: 3px;
      }
      .level-perfect { background: #dcfce7; color: #15803d; }
      .level-good { background: #fef9c3; color: #92400e; }
      .level-advanced { background: #f3f4f6; color: #6b7280; }

      .section-label {
        font-size: 11px;
        font-weight: 700;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
        margin-top: 12px;
      }
      .section-label:first-child { margin-top: 0; }

      #loading-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(255,255,255,0.75);
        z-index: 100;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: 600;
        color: #333;
      }
      #loading-overlay.visible { display: flex; }
    </style>
  </head>

      // ============================================
      // PATCH: searchFoods es async en algorithm.js y llama renderAutocomplete
      // Para tests usamos una version sincrona local
      // ============================================
      function searchFoodsSync(query) {
        if (!window.foodsDatabase || !window.foodsDatabase.length) return [];
        var tokens = tokenize(query);
        var results = window.foodsDatabase.filter(function(food) {
          var hay = norm(
            (food.name || '') + ' ' +
            (food.brand || '') + ' ' +
            (food.source || '') + ' ' +
            (food.category || '')
          );
          return tokens.every(function(t) { return hay.includes(t); });
        });
        results.sort(function(a, b) {
          var sa = tokenSortScore(norm(a.name || ''), tokens);
          var sb = tokenSortScore(norm(b.name || ''), tokens);
          if (sa !== sb) return sb - sa;
          return (a.name || '').length - (b.name || '').length;
        });
        return results;
      }

      // ============================================
      // RENDER SKELETON
      // ============================================
      function renderSkeleton() {
        var container = document.getElementById('tests-container');
        container.innerHTML = '';
        TEST_CASES.forEach(function(tc) {
          var card = document.createElement('div');
          card.className = 'test-card';
          card.id = 'card-' + tc.id;

          card.innerHTML = '<div class="test-header">' +
            '<span class="badge badge-pending">...</span>' +
            '<span class="test-id">' + tc.id + '</span>' +
            '<span class="test-label">' + tc.label + '</span>' +
            '<span class="test-note">' + (tc.note || '') + '</span>' +
            '<span class="chevron">&#9654;</span>' +
            '</div>' +
            '<div class="test-body"></div>';

          card.querySelector('.test-header').addEventListener('click', function() {
            card.classList.toggle('open');
          });

          container.appendChild(card);
        });
      }

      // ============================================
      // UPDATE CARD
      // ============================================
      function updateCard(tc, result) {
        var card = document.getElementById('card-' + tc.id);
        if (!card) return;

        card.classList.remove('result-pass', 'result-fail', 'result-skip');
        card.classList.add('result-' + result.status);

        var header = card.querySelector('.test-header');
        var badge = header.querySelector('.badge');
        badge.className = 'badge';
        if (result.status === 'pass') {
          badge.classList.add('badge-pass');
          badge.textContent = 'PASS';
        } else if (result.status === 'fail') {
          badge.classList.add('badge-fail');
          badge.textContent = 'FAIL';
        } else {
          badge.classList.add('badge-skip');
          badge.textContent = 'SKIP';
        }

        var body = card.querySelector('.test-body');
        var html = '';

        // Fail reasons
        if (result.status === 'fail' && result.failures && result.failures.length) {
          html += '<div class="fail-reason"><strong>Fallos detectados:</strong><ul>';
          result.failures.forEach(function(f) {
            html += '<li>' + escHtml(f) + '</li>';
          });
          html += '</ul></div>';
        }

        if (result.status === 'skip') {
          html += '<div class="fail-reason" style="background:#fffbeb;border-color:#fde68a;color:#92400e;">' +
            escHtml(result.skipReason || 'Alimento no encontrado en DB') + '</div>';
        }

        // Search results
        if (result.searchResults && result.searchResults.length) {
          html += '<div class="section-label">Busqueda: "' + escHtml(tc.searchQuery) + '" — top 3</div>';
          html += '<div class="results-table-wrap"><table class="results-table">' +
            '<thead><tr><th>#</th><th>Nombre</th><th>Subgrupo</th><th>Categoria</th></tr></thead><tbody>';
          result.searchResults.slice(0, 3).forEach(function(f, i) {
            html += '<tr><td>' + (i + 1) + '</td><td>' + escHtml(f.name) + '</td>' +
              '<td>' + escHtml(f.subgroup || '—') + '</td>' +
              '<td>' + escHtml(f.category || '—') + '</td></tr>';
          });
          html += '</tbody></table></div>';
        }

        // Alternatives
        if (result.alternatives && result.alternatives.length) {
          html += '<div class="section-label">Alternativas — top ' +
            Math.min(10, result.alternatives.length) + ' de ' + result.alternatives.length + '</div>';
          html += '<div class="results-table-wrap"><table class="results-table">' +
            '<thead><tr><th>#</th><th>Nombre</th><th>Tier</th><th>Nivel</th><th>Score</th><th>Cantidad equiv.</th><th>Subgrupo</th></tr></thead><tbody>';
          result.alternatives.slice(0, 10).forEach(function(a, i) {
            html += '<tr>' +
              '<td>' + (i + 1) + '</td>' +
              '<td>' + escHtml(a.name) + '</td>' +
              '<td><span class="tier-badge tier' + a.tier + '">T' + a.tier + '</span></td>' +
              '<td><span class="level-badge level-' + a.level + '">' + a.level + '</span></td>' +
              '<td>' + a.matchScore + '</td>' +
              '<td>' + a.equivalentAmount + 'g</td>' +
              '<td>' + escHtml(a.subgroup || '—') + '</td>' +
              '</tr>';
          });
          html += '</tbody></table></div>';
        }

        // Same-results comparison
        if (result.comparisonInfo) {
          html += '<div class="section-label">Comparacion con ' + escHtml(result.comparisonInfo.refId) + '</div>';
          html += '<table class="results-table"><thead><tr>' +
            '<th>#</th><th>Este test</th><th>Referencia (' + escHtml(result.comparisonInfo.refId) + ')</th><th>Match</th>' +
            '</tr></thead><tbody>';
          var maxLen = Math.max(result.comparisonInfo.thisTop5.length, result.comparisonInfo.refTop5.length);
          for (var i = 0; i < maxLen; i++) {
            var t = result.comparisonInfo.thisTop5[i] || '(vacio)';
            var r = result.comparisonInfo.refTop5[i] || '(vacio)';
            var match = norm(t) === norm(r);
            html += '<tr>' +
              '<td>' + (i + 1) + '</td>' +
              '<td>' + escHtml(t) + '</td>' +
              '<td>' + escHtml(r) + '</td>' +
              '<td style="color:' + (match ? '#16a34a' : '#dc2626') + '">' + (match ? 'OK' : 'DIFF') + '</td>' +
              '</tr>';
          }
          html += '</tbody></table>';
        }

        body.innerHTML = html;

        // Auto-open on fail
        if (result.status === 'fail') {
          card.classList.add('open');
        }
      }

      // ============================================
      // SUMMARY BAR
      // ============================================
      function updateSummary(pass, fail, skip) {
        var total = TEST_CASES.length;
        var count = document.getElementById('summary-count');
        count.textContent = pass + '/' + total + ' PASS';
        count.className = fail > 0 ? 'has-fail' : 'all-pass';
        document.getElementById('pill-pass').textContent = 'PASS: ' + pass;
        document.getElementById('pill-fail').textContent = 'FAIL: ' + fail;
        document.getElementById('pill-skip').textContent = 'SKIP: ' + skip;
        document.getElementById('progress-msg').textContent = '';
      }

      // ============================================
      // NORM HELPER (mirrors algorithm.js)
      // ============================================
      function norm(str) {
        return (str || '')
          .toLowerCase()
          .normalize('NFD')
          .replace(/[̀-ͯ]/g, '')
          .replace(/[^a-z0-9]+/g, ' ')
          .trim();
      }

      // ============================================
      // ESCAPE HTML
      // ============================================
      function escHtml(str) {
        return (str || '').toString()
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // ============================================
      // RUN A SINGLE TEST
      // ============================================
      async function runTest(tc, refResults) {
        // refResults: map of T0X -> searchResults top-5 names (for sameResultsAs)
        var result = {
          status: 'fail',
          failures: [],
          searchResults: [],
          alternatives: [],
          comparisonInfo: null,
          skipReason: null
        };

        // 1. Search
        var searchResults = searchFoodsSync(tc.searchQuery);
        result.searchResults = searchResults;

        if (!searchResults.length) {
          result.status = 'skip';
          result.skipReason = 'Alimento no encontrado en DB: "' + tc.searchQuery + '"';
          return result;
        }

        var food = searchResults[0];

        // 2. sameResultsAs check
        if (tc.sameResultsAs) {
          var refTop5 = refResults[tc.sameResultsAs] || [];
          var thisTop5 = searchResults.slice(0, 5).map(function(f) { return f.name; });
          result.comparisonInfo = {
            refId: tc.sameResultsAs,
            thisTop5: thisTop5,
            refTop5: refTop5
          };

          var allMatch = thisTop5.length === refTop5.length &&
            thisTop5.every(function(name, i) {
              return norm(name) === norm(refTop5[i] || '');
            });

          if (!allMatch) {
            result.failures.push(
              'Orden de palabras cambia los resultados. Top-5 difiere del caso ' + tc.sameResultsAs + ': ' +
              '[' + thisTop5.join(', ') + '] vs [' + refTop5.join(', ') + ']'
            );
          }

          result.status = result.failures.length ? 'fail' : 'pass';
          return result;
        }

        // 3. calculateAlternatives
        var alts;
        try {
          alts = await calculateAlternatives(food, tc.amount);
        } catch (e) {
          result.status = 'fail';
          result.failures.push('Error en calculateAlternatives: ' + e.message);
          return result;
        }

        var allAlts = [].concat(alts.intercambios || [], alts.familia || [], alts.preparados || []);
        result.alternatives = allAlts;

        // 4. expectInTop10: al menos 2 de los keywords en los primeros 10 nombres
        if (tc.expectInTop10 && tc.expectInTop10.length) {
          var top10Names = allAlts.slice(0, 10).map(function(a) { return norm(a.name); });
          var matched = tc.expectInTop10.filter(function(kw) {
            var kwn = norm(kw);
            return top10Names.some(function(n) { return n.includes(kwn); });
          });
          if (matched.length < 2) {
            var missing = tc.expectInTop10.filter(function(kw) {
              var kwn = norm(kw);
              return !top10Names.some(function(n) { return n.includes(kwn); });
            });
            result.failures.push(
              'expectInTop10: solo ' + matched.length + '/2 keywords encontrados. ' +
              'Faltan: [' + missing.join(', ') + ']. ' +
              'Top-10: [' + allAlts.slice(0, 10).map(function(a) { return a.name; }).join(' | ') + ']'
            );
          }
        }

        // 5. expectNotInResults: ninguno debe aparecer en ninguna alternativa
        if (tc.expectNotInResults && tc.expectNotInResults.length) {
          var allNames = allAlts.map(function(a) { return norm(a.name); });
          tc.expectNotInResults.forEach(function(kw) {
            var kwn = norm(kw);
            var found = allAlts.filter(function(a) { return norm(a.name).includes(kwn); });
            if (found.length) {
              result.failures.push(
                'expectNotInResults: "' + kw + '" aparece en resultados (' +
                found.map(function(f) { return f.name; }).join(', ') + ')'
              );
            }
          });
        }

        // 6. expectTier1Category: al menos 1 alternativa con tier=1
        if (tc.expectTier1Category) {
          var t1results = allAlts.filter(function(a) { return a.tier === 1; });
          if (!t1results.length) {
            result.failures.push(
              'expectTier1Category: no hay resultados de Tier 1. ' +
              'Alimento base: subgroup=' + (food.subgroup || 'null') + '. ' +
              'Total alternativas: ' + allAlts.length
            );
          }
        }

        result.status = result.failures.length ? 'fail' : 'pass';
        return result;
      }

      // ============================================
      // RUN ALL TESTS
      // ============================================
      async function runAllTests() {
        var btn = document.getElementById('run-btn');
        var progressMsg = document.getElementById('progress-msg');
        btn.disabled = true;
        btn.textContent = 'Ejecutando...';

        var pass = 0, fail = 0, skip = 0;

        // First pass: collect top-5 names for sameResultsAs references
        var refResults = {};
        TEST_CASES.forEach(function(tc) {
          if (!tc.sameResultsAs) {
            var sr = searchFoodsSync(tc.searchQuery);
            refResults[tc.id] = sr.slice(0, 5).map(function(f) { return f.name; });
          }
        });

        // Run each test with a small yield so UI stays responsive
        for (var i = 0; i < TEST_CASES.length; i++) {
          var tc = TEST_CASES[i];
          progressMsg.textContent = 'Ejecutando ' + tc.id + '...';

          // Yield to render
          await new Promise(function(resolve) { setTimeout(resolve, 0); });

          var result = await runTest(tc, refResults);

          if (result.status === 'pass') pass++;
          else if (result.status === 'fail') fail++;
          else skip++;

          updateCard(tc, result);
          updateSummary(pass, fail, skip);
        }

        btn.disabled = false;
        btn.textContent = 'Ejecutar tests';
        progressMsg.textContent = 'Completado — ' + new Date().toLocaleTimeString('es-ES');
      }

      // ============================================
      // INIT
      // ============================================
      async function init() {
        var overlay = document.getElementById('loading-overlay');
        overlay.classList.add('visible');

        renderSkeleton();

        try {
          var response = await fetch('database.json');
          if (!response.ok) throw new Error('HTTP ' + response.status);
          var data = await response.json();
          window.foodsDatabase = data.foods || data;

          overlay.classList.remove('visible');

          var btn = document.getElementById('run-btn');
          btn.disabled = false;
          document.getElementById('progress-msg').textContent =
            window.foodsDatabase.length + ' alimentos cargados';

          btn.addEventListener('click', runAllTests);

          // Auto-run on load
          runAllTests();

        } catch (err) {
          overlay.classList.remove('visible');
          document.getElementById('summary-count').textContent = 'ERROR';
          document.getElementById('progress-msg').textContent =
            'Error cargando DB: ' + err.message + '. Abre desde un servidor local (npx serve .).';
        }
      }

      init();
    </script>

            return result;
          }
          var allAlts = [].concat(alts.intercambios || [], alts.familia || [], alts.preparados || []);
          result.alternatives = allAlts;

          // 4. Forbidden check: NONE of these keywords may appear in any result
          if (tc.forbidden && tc.forbidden.length) {
            tc.forbidden.forEach(function (kw) {
              var kwn = norm(kw);
              var found = allAlts.filter(function (a) { return norm(a.name).includes(kwn); });
              if (found.length) {
                var example = found[0].name;
                result.failures.push('FORBIDDEN "' + kw + '" encontrado: ' + example);
                result.forbiddenChecks.push({ kw: kw, found: true, example: example });
              } else {
                result.forbiddenChecks.push({ kw: kw, found: false, example: '' });
              }
            });
          }

          // 5. Required check (any-of): at least 1 result must match at least 1 required keyword
          var requiredMet = false;
          if (tc.required && tc.required.length) {
            tc.required.forEach(function (kw) {
              var kwn = norm(kw);
              var found = allAlts.some(function (a) { return norm(a.name).includes(kwn); });
              result.requiredChecks.push({ kw: kw, found: found });
              if (found) requiredMet = true;
            });
            if (!requiredMet) {
              result.failures.push(
                'REQUIRED (any-of): ninguno de [' + tc.required.join(', ') + '] encontrado en ' +
                allAlts.length + ' alternativas'
              );
            }
          } else {
            requiredMet = true; // no required keywords = pass on this axis
          }

          result.status = result.failures.length ? 'fail' : 'pass';
          return result;
        }

        async function runAllClinicalCases() {
          clinicalSummary = { pass: 0, fail: 0, skip: 0 };
          document.getElementById('cprogress').textContent = 'Ejecutando...';

          for (var i = 0; i < CLINICAL_CASES.length; i++) {
            var tc = CLINICAL_CASES[i];
            document.getElementById('cprogress').textContent = 'Ejecutando ' + tc.id + '...';
            await new Promise(function (r) { setTimeout(r, 0); });

            var result = await runClinicalCase(tc);
            if (result.status === 'pass') clinicalSummary.pass++;
            else if (result.status === 'fail') clinicalSummary.fail++;
            else clinicalSummary.skip++;

            updateClinicalCard(tc, result);
            updateClinicalSummary();
          }

          document.getElementById('cprogress').textContent =
            'Completado — ' + new Date().toLocaleTimeString('es-ES');
        }

        // Wait for the DB to be loaded (the main init() does the fetch),
        // then auto-run clinical tests after main tests finish.
        function waitForDbThenRun() {
          if (window.foodsDatabase && window.foodsDatabase.length) {
            buildSection();
            runAllClinicalCases();
          } else {
            setTimeout(waitForDbThenRun, 200);
          }
        }

        // Small delay so main test suite runs first and DB is available.
        setTimeout(waitForDbThenRun, 500);

      })();

      // ============================================
      // CULINARY ACCEPTANCE CASES — CAC-0..CAC-4
      // ============================================
      // These cases verify the bulk-label-foods runtime layer (algorithm.js
      // hard filters + soft demotions). They depend on foods in database.json
      // having been labeled by scripts/bulk_label_foods.py.
      //
      // Graceful degradation: if the origin food has no ready_to_eat flag
      // (undefined), filter-dependent cases SKIP rather than fail — this is
      // correct behavior before the labeling run completes.
      //
      // CAC-0: kill-switch smoke (always runnable — no flags needed).
      // CAC-1: hard filter — raw_ingredient===true must be excluded.
      // CAC-2: soft demotion — breakfast cereals demoted for comida origin.
      // CAC-3: soft demotion — exotic seafood stays in list but ranked last.
      // CAC-4: soft demotion — meal_slot mismatch pushes candidates down.

      var CULINARY_AC_CASES = [
        {
          id: 'CAC-1',
          title: 'Arroz: ingredientes crudos de cocina excluidos (hard filter)',
          originName: 'Arroz blanco cocido',
          mustNotInclude: ['harina de trigo', 'centeno crudo', 'centeno grano', 'almidon', 'almidón', 'maicena', 'harina de fuerza', 'harina de centeno'],
          mustInclude: ['pasta', 'pan', 'patata', 'cuscus', 'cuscús'],
          severity: 'forbid',
          note: 'ready_to_eat===true + raw_ingredient===true → hard filter. Requiere que el origen tenga flag ready_to_eat.'
        },
        {
          id: 'CAC-2',
          title: 'Arroz: cereales endulzados de desayuno no en top-10 T2',
          originName: 'Arroz blanco cocido',
          demoted: ['choco krispies', 'frosties', 'smacks', 'cereales con miel', 'muesli azucarado'],
          topN: 10,
          severity: 'demote',
          note: 'meal_slot=desayuno vs comida → demotion 0.6×. Cereales azucarados no deben aparecer en top-10 de intercambios.'
        },
        {
          id: 'CAC-3',
          title: 'Pollo: mariscos exóticos en lista pero en último 30%',
          originName: 'Pechuga de pollo a la plancha',
          demoted: ['cangrejo', 'langosta', 'centollo'],
          topN: null,
          severity: 'demote',
          note: 'exotic===true → 0.7×, frequency===raro → 0.5× (acumulado 0.35×). Permitidos en lista pero al fondo.'
        },
        {
          id: 'CAC-4',
          title: 'Tortilla francesa (cena): candidatos de desayuno demotados',
          originName: 'Tortilla francesa',
          demoted: ['choco krispies', 'frosties', 'cereales'],
          topN: 5,
          severity: 'demote',
          note: 'meal_slot mismatch cena vs desayuno → demotion 0.6×. No en top-5.'
        },
      ];

      // ============================================
      // CULINARY SECTION RENDER + RUNNER
      // ============================================
      (function () {

        var cacSectionEl = null;
        var cacCardEls = {};
        var cacSummary = { pass: 0, fail: 0, skip: 0 };

        function buildCacSection() {
          cacSectionEl = document.createElement('div');
          cacSectionEl.className = 'clinical-section';
          cacSectionEl.style.marginTop = '40px';
          cacSectionEl.innerHTML =
            '<div class="clinical-section-header">' +
              'Culinary Acceptance Cases (bulk-label-foods)' +
              '<div class="clinical-sub">CAC-0..CAC-4 — Kill-switch + Hard filters + Soft demotions</div>' +
            '</div>' +
            '<div class="clinical-summary-bar" id="cac-summary-bar">' +
              '<span id="cacpill-pass" class="stat-pill pass">PASS: 0</span>' +
              '<span id="cacpill-fail" class="stat-pill fail">FAIL: 0</span>' +
              '<span id="cacpill-skip" class="stat-pill skip">SKIP: 0</span>' +
              '<span id="cacprogress" style="font-size:12px;color:#888;margin-left:4px;">Pendiente</span>' +
            '</div>' +
            '<div class="clinical-cards" id="cac-cards"></div>';

          document.body.appendChild(cacSectionEl);

          // CAC-0 card (kill-switch smoke)
          var cac0 = document.createElement('div');
          cac0.className = 'clinical-card';
          cac0.id = 'ccard-CAC-0';
          cac0.innerHTML =
            '<div class="clinical-header">' +
              '<span class="cbadge cbadge-pending">...</span>' +
              '<span class="cid">CAC-0</span>' +
              '<span class="clabel">Kill-switch smoke: BULK_LABEL_FILTERS_ENABLED=false desactiva todos los filtros</span>' +
              '<span class="test-note" style="font-size:11px;color:#888;font-style:italic;max-width:340px;text-align:right;">' +
                'Con flag=false: Harina de trigo debe aparecer. Con flag=true: Harina de trigo excluida.' +
              '</span>' +
              '<span class="chevron" style="font-size:10px;color:#bbb;margin-left:4px;">&#9654;</span>' +
            '</div>' +
            '<div class="clinical-body"></div>';
          cac0.querySelector('.clinical-header').addEventListener('click', function () {
            cac0.classList.toggle('copen');
          });
          cacCardEls['CAC-0'] = cac0;
          document.getElementById('cac-cards').appendChild(cac0);

          // CAC-1..CAC-4 cards
          CULINARY_AC_CASES.forEach(function (tc) {
            var card = document.createElement('div');
            card.className = 'clinical-card';
            card.id = 'ccard-' + tc.id;
            card.innerHTML =
              '<div class="clinical-header">' +
                '<span class="cbadge cbadge-pending">...</span>' +
                '<span class="cid">' + escHtml(tc.id) + '</span>' +
                '<span class="clabel">' + escHtml(tc.title) + '</span>' +
                '<span class="test-note" style="font-size:11px;color:#888;font-style:italic;max-width:340px;text-align:right;">' +
                  escHtml(tc.note) + '</span>' +
                '<span class="chevron" style="font-size:10px;color:#bbb;margin-left:4px;">&#9654;</span>' +
              '</div>' +
              '<div class="clinical-body"></div>';
            card.querySelector('.clinical-header').addEventListener('click', function () {
              card.classList.toggle('copen');
            });
            cacCardEls[tc.id] = card;
            document.getElementById('cac-cards').appendChild(card);
          });
        }

        function updateCacCard(id, result) {
          var card = cacCardEls[id];
          if (!card) return;
          card.classList.remove('cpass', 'cfail', 'cskip');
          card.classList.add(result.status === 'pass' ? 'cpass' : result.status === 'fail' ? 'cfail' : 'cskip');
          var badge = card.querySelector('.cbadge');
          badge.className = 'cbadge';
          if (result.status === 'pass') {
            badge.classList.add('cbadge-pass'); badge.textContent = 'PASS';
          } else if (result.status === 'fail') {
            badge.classList.add('cbadge-fail'); badge.textContent = 'FAIL';
          } else {
            badge.classList.add('cbadge-skip'); badge.textContent = 'SKIP';
          }
          var body = card.querySelector('.clinical-body');
          body.innerHTML = result.html || '';
          if (result.status === 'fail') card.classList.add('copen');
        }

        function updateCacSummary() {
          var s = cacSummary;
          document.getElementById('cacpill-pass').textContent = 'PASS: ' + s.pass;
          document.getElementById('cacpill-fail').textContent = 'FAIL: ' + s.fail;
          document.getElementById('cacpill-skip').textContent = 'SKIP: ' + s.skip;
        }

        // ── CAC-0: kill-switch smoke ───────────────────────────────────────
        async function runCAC0() {
          var result = { status: 'fail', html: '' };
          var originQuery = 'Arroz blanco cocido';
          var matches = searchFoodsSync(originQuery);
          if (!matches || !matches.length) {
            result.status = 'skip';
            result.html = '<div class="cskip-box">Alimento no encontrado: "' + escHtml(originQuery) + '"</div>';
            return result;
          }
          var originFood = matches[0];

          // Check the origin has the ready_to_eat flag — otherwise the hard
          // filter can't be verified and we skip rather than false-fail.
          if (typeof originFood.ready_to_eat === 'undefined') {
            result.status = 'skip';
            result.html = '<div class="cskip-box">Origen sin flag ready_to_eat — DB no etiquetada todavía. Ejecutar scripts/bulk_label_foods.py primero.</div>';
            return result;
          }

          var harinaNorm = 'harina de trigo';
          var lines = [];
          var passed = true;

          // Step 1: filters DISABLED — Harina should appear (no hard filter)
          window.BULK_LABEL_FILTERS_ENABLED = false;
          var altsOff;
          try {
            altsOff = await calculateAlternatives(originFood, 100);
          } finally {
            window.BULK_LABEL_FILTERS_ENABLED = true; // always restore
          }
          var allOff = [].concat(altsOff.intercambios || [], altsOff.familia || [], altsOff.preparados || []);
          var harinaPresentOff = allOff.some(function (a) { return norm(a.name).includes(harinaNorm); });

          // Step 2: filters ENABLED — Harina should be absent (hard filtered)
          var altsOn = await calculateAlternatives(originFood, 100);
          var allOn = [].concat(altsOn.intercambios || [], altsOn.familia || [], altsOn.preparados || []);
          var harinaPresentOn = allOn.some(function (a) { return norm(a.name).includes(harinaNorm); });

          // Evaluate
          var step1ok = harinaPresentOff; // filter OFF → harina should appear
          var step2ok = !harinaPresentOn; // filter ON  → harina should be absent

          if (!step1ok) {
            lines.push('<span class="cchip cchip-fail">FAIL: flag=false — "harina de trigo" no encontrada (esperada en lista sin filtros)</span>');
            passed = false;
          } else {
            lines.push('<span class="cchip cchip-ok">OK: flag=false — "harina de trigo" presente en lista (correcto)</span>');
          }

          if (!step2ok) {
            lines.push('<span class="cchip cchip-fail">FAIL: flag=true — "harina de trigo" sigue en lista (debería ser filtrada)</span>');
            passed = false;
          } else {
            lines.push('<span class="cchip cchip-ok">OK: flag=true — "harina de trigo" excluida por hard filter</span>');
          }

          result.status = passed ? 'pass' : 'fail';
          result.html = '<div class="ccheck">' + lines.join('') + '</div>' +
            '<div style="font-size:11px;color:#888;margin-top:6px;">' +
              'Origen: <strong>' + escHtml(originFood.name) + '</strong> | ' +
              'ready_to_eat: ' + escHtml(String(originFood.ready_to_eat)) + ' | ' +
              'resultados con flag=false: ' + allOff.length + ' | con flag=true: ' + allOn.length +
            '</div>';
          return result;
        }

        // ── CAC-1..CAC-4 runner ───────────────────────────────────────────
        async function runCACCase(tc) {
          var result = { status: 'fail', html: '' };

          // Find origin food
          var matches = searchFoodsSync(tc.originName);
          if (!matches || !matches.length) {
            result.status = 'skip';
            result.html = '<div class="cskip-box">Alimento no encontrado: "' + escHtml(tc.originName) + '"</div>';
            return result;
          }
          var originFood = matches[0];

          // Graceful degradation check for flag-dependent cases
          if (tc.severity === 'forbid' && typeof originFood.ready_to_eat === 'undefined') {
            result.status = 'skip';
            result.html = '<div class="cskip-box">DB sin etiquetar — ' + escHtml(tc.id) + ' requiere ready_to_eat en el origen. Ejecutar bulk_label_foods.py primero.</div>';
            return result;
          }

          var alts;
          try {
            alts = await calculateAlternatives(originFood, 100);
          } catch (e) {
            result.status = 'fail';
            result.html = '<div class="cfail-box">Error en calculateAlternatives: ' + escHtml(e.message) + '</div>';
            return result;
          }

          var intercambios = alts.intercambios || [];
          var allAlts = [].concat(intercambios, alts.familia || [], alts.preparados || []);
          var failures = [];
          var lines = [];

          if (tc.severity === 'forbid') {
            // mustNotInclude: none of these may appear anywhere
            (tc.mustNotInclude || []).forEach(function (kw) {
              var kwn = norm(kw);
              var found = allAlts.filter(function (a) { return norm(a.name).includes(kwn); });
              if (found.length) {
                failures.push('FORBIDDEN "' + kw + '" encontrado: ' + found[0].name);
                lines.push('<span class="cchip cchip-fail">! ' + escHtml(kw) + ': ' + escHtml(found[0].name) + '</span>');
              } else {
                lines.push('<span class="cchip cchip-ok">+ excluido: ' + escHtml(kw) + '</span>');
              }
            });

            // mustInclude: at least one of these must appear
            var anyRequired = false;
            var reqLines = [];
            (tc.mustInclude || []).forEach(function (kw) {
              var kwn = norm(kw);
              var found = allAlts.some(function (a) { return norm(a.name).includes(kwn); });
              if (found) anyRequired = true;
              reqLines.push('<span class="cchip ' + (found ? 'cchip-ok' : 'cchip-warn') + '">' + (found ? '+ ' : '? ') + escHtml(kw) + '</span>');
            });
            if ((tc.mustInclude || []).length && !anyRequired) {
              failures.push('REQUIRED (any-of): ninguno de [' + tc.mustInclude.join(', ') + '] encontrado');
            }
            lines = lines.concat(reqLines);

          } else if (tc.severity === 'demote') {
            // demoted: these items must NOT appear in the topN positions
            // If topN is null, they must appear only in the last 30% of intercambios
            var checkList = intercambios.length ? intercambios : allAlts;
            var topCut = tc.topN !== null ? tc.topN : Math.floor(checkList.length * 0.7);

            (tc.demoted || []).forEach(function (kw) {
              var kwn = norm(kw);
              var idx = -1;
              for (var i = 0; i < checkList.length; i++) {
                if (norm(checkList[i].name).includes(kwn)) { idx = i; break; }
              }
              if (idx === -1) {
                // Not found at all → effectively demoted / not in DB → PASS
                lines.push('<span class="cchip cchip-ok">? no encontrado: ' + escHtml(kw) + ' (ok — ausente o sin etiqueta)</span>');
              } else if (idx < topCut) {
                failures.push('DEMOTED item "' + kw + '" aparece en posición ' + (idx + 1) + ' (topCut=' + topCut + ')');
                lines.push('<span class="cchip cchip-fail">! pos ' + (idx + 1) + ': ' + escHtml(kw) + '</span>');
              } else {
                lines.push('<span class="cchip cchip-ok">+ demotado: ' + escHtml(kw) + ' (pos ' + (idx + 1) + '/' + checkList.length + ')</span>');
              }
            });

            // If no flags on DB, skip with warning rather than false-fail
            var anyFlagFound = allAlts.some(function (a) {
              return typeof a.meal_slot !== 'undefined' || typeof a.exotic !== 'undefined';
            });
            if (!anyFlagFound && tc.severity === 'demote') {
              result.status = 'skip';
              result.html = '<div class="cskip-box">DB sin etiquetas bulk-label — demotions no activas todavía.</div>';
              return result;
            }
          }

          result.status = failures.length ? 'fail' : 'pass';
          var html = '<div class="ccheck">' + lines.join('') + '</div>';
          if (failures.length) {
            html += '<div class="cfail-box"><strong>Fallos:</strong><ul>' +
              failures.map(function (f) { return '<li>' + escHtml(f) + '</li>'; }).join('') +
              '</ul></div>';
          }
          html += '<div style="font-size:11px;color:#888;margin-top:6px;">' +
            'Origen: <strong>' + escHtml(originFood.name) + '</strong> | ' +
            'ready_to_eat: ' + escHtml(String(originFood.ready_to_eat)) + ' | ' +
            'meal_slot: ' + escHtml(String(originFood.meal_slot)) + ' | ' +
            'intercambios: ' + intercambios.length + ' total: ' + allAlts.length +
          '</div>';
          result.html = html;
          return result;
        }

        // ── Main runner ───────────────────────────────────────────────────
        async function runAllCACCases() {
          cacSummary = { pass: 0, fail: 0, skip: 0 };
          document.getElementById('cacprogress').textContent = 'Ejecutando...';

          // CAC-0: kill-switch smoke
          document.getElementById('cacprogress').textContent = 'Ejecutando CAC-0...';
          await new Promise(function (r) { setTimeout(r, 0); });
          var r0 = await runCAC0();
          if (r0.status === 'pass') cacSummary.pass++;
          else if (r0.status === 'fail') cacSummary.fail++;
          else cacSummary.skip++;
          updateCacCard('CAC-0', r0);
          updateCacSummary();

          // CAC-1..CAC-4
          for (var i = 0; i < CULINARY_AC_CASES.length; i++) {
            var tc = CULINARY_AC_CASES[i];
            document.getElementById('cacprogress').textContent = 'Ejecutando ' + tc.id + '...';
            await new Promise(function (r) { setTimeout(r, 0); });
            var res = await runCACCase(tc);
            if (res.status === 'pass') cacSummary.pass++;
            else if (res.status === 'fail') cacSummary.fail++;
            else cacSummary.skip++;
            updateCacCard(tc.id, res);
            updateCacSummary();
          }

          document.getElementById('cacprogress').textContent =
            'Completado — ' + new Date().toLocaleTimeString('es-ES');
        }

        function waitForDbThenRunCAC() {
          if (window.foodsDatabase && window.foodsDatabase.length) {
            buildCacSection();
            runAllCACCases();
          } else {
            setTimeout(waitForDbThenRunCAC, 200);
          }
        }

        // Run after the clinical section (which has a 500ms head start).
        setTimeout(waitForDbThenRunCAC, 1500);

      })();
    </script>
  </body>
